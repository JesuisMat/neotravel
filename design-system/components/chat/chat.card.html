<!-- @dsCard group="Composants" viewport="700x360" name="Conversation (chat)" subtitle="Bulles agent/prospect, saisie, propositions" -->
<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../../styles.css" />
<style>
  html,body{margin:0}
  body{background:var(--gradient-dawn);font-family:var(--font-sans);color:var(--text-body);padding:24px}
  .chat{max-width:560px;margin:0 auto;display:flex;flex-direction:column;gap:14px}
  .chips{display:flex;gap:9px;flex-wrap:wrap;margin-top:4px}
</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<script type="text/babel">
  const { ChatBubble, SuggestionChip } = window.NeoTravelDesignSystem_389d31;
  function Demo() {
    return (
      <div className="chat">
        <ChatBubble from="agent" name="Assistant NeoTravel">Bonjour ! Décrivez-moi votre besoin de transport et je vous prépare un devis en quelques minutes.</ChatBubble>
        <div className="chips">
          <SuggestionChip>Sortie scolaire</SuggestionChip>
          <SuggestionChip>Séminaire</SuggestionChip>
          <SuggestionChip>Événement</SuggestionChip>
          <SuggestionChip>Autre</SuggestionChip>
        </div>
        <ChatBubble from="user">48 personnes, Paris → Bordeaux, le 14 juillet, retour le 16.</ChatBubble>
        <ChatBubble from="agent" typing />
      </div>
    );
  }
  ReactDOM.createRoot(document.getElementById('root')).render(<Demo />);
</script>
</body>
</html>
