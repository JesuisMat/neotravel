<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../../styles.css" />
<style>
  html,body{margin:0}
  body{background:var(--surface-page);font-family:var(--font-sans);color:var(--text-body);padding:22px}
  .row{display:flex;align-items:center;gap:14px;flex-wrap:wrap;margin-bottom:18px}
  .lbl{font:var(--type-label);text-transform:uppercase;letter-spacing:var(--tracking-caps);color:var(--text-subtle);width:100%;margin:0 0 2px}
</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<script type="text/babel">
  const { Button, Card, Badge, Avatar } = window.NeoTravelDesignSystem_389d31;
  function Demo() {
    return (
      <div>
        <div className="row">
          <span className="lbl">Boutons</span>
          <Button variant="accent" size="lg" iconRight={<span>→</span>}>Demander mon devis</Button>
          <Button variant="primary">Envoyer</Button>
          <Button variant="secondary">Modifier</Button>
          <Button variant="ghost">Annuler</Button>
          <Button variant="dark" size="sm">Tableau de bord</Button>
          <Button variant="primary" disabled>Indisponible</Button>
        </div>
        <div className="row">
          <span className="lbl">Badges &amp; avatars</span>
          <Badge tone="brand">Qualifié</Badge>
          <Badge tone="accent" variant="solid">Prioritaire</Badge>
          <Badge tone="positive">Confirmé</Badge>
          <Badge tone="caution">Relance 1</Badge>
          <Badge tone="negative">Refusé</Badge>
          <Avatar name="Marie Dupont" tone="brand" />
          <Avatar name="NeoTravel Assistant" tone="accent" />
          <Avatar name="Julien" tone="petrol" />
        </div>
        <div className="row" style={{flexWrap:'nowrap'}}>
          <span className="lbl">Cartes</span>
          <Card style={{flex:1}}><strong style={{color:'var(--text-strong)'}}>Carte posée</strong><div style={{fontSize:14,color:'var(--text-muted)',marginTop:4}}>Blanc chaud, ombre diffuse</div></Card>
          <Card variant="sunken" style={{flex:1}}><strong style={{color:'var(--text-strong)'}}>Creusée</strong><div style={{fontSize:14,color:'var(--text-muted)',marginTop:4}}>Ombre interne</div></Card>
          <Card variant="dark" style={{flex:1}}><strong>Petrol</strong><div style={{fontSize:14,color:'var(--text-on-dark-muted)',marginTop:4}}>Surface profonde</div></Card>
        </div>
      </div>
    );
  }
  ReactDOM.createRoot(document.getElementById('root')).render(<Demo />);
</script>
</body>
</html>
