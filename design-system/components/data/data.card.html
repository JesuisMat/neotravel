<!-- @dsCard group="Composants" viewport="700x320" name="Statuts & KPIs (pilotage)" subtitle="Pilules de statut lead + tuiles indicateurs" -->
<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../../styles.css" />
<style>
  html,body{margin:0}
  body{background:var(--surface-page);font-family:var(--font-sans);color:var(--text-body);padding:22px}
  .row{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:20px}
  .lbl{font:var(--type-label);text-transform:uppercase;letter-spacing:var(--tracking-caps);color:var(--text-subtle);width:100%;margin:0 0 2px}
  .grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px}
</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<script type="text/babel">
  const { StatusBadge, StatCard, LEAD_STATUSES } = window.NeoTravelDesignSystem_389d31;
  function Demo() {
    return (
      <div>
        <div className="row">
          <span className="lbl">Statuts commerciaux — machine d'état</span>
          {Object.keys(LEAD_STATUSES).map((k) => <StatusBadge key={k} status={k} />)}
        </div>
        <div className="grid">
          <StatCard label="Leads aujourd'hui" value="62" accent caption="objectif 60/j" />
          <StatCard label="Devis envoyés" value="48" delta="9 %" deltaDir="up" caption="cette semaine" />
          <StatCard label="Conversion" value="34" unit="%" delta="6 pts" deltaDir="up" caption="vs. mois dernier" />
          <StatCard label="Délai moy. devis" value="4,2" unit="min" delta="1,1 min" deltaDir="down" caption="plus rapide" />
        </div>
      </div>
    );
  }
  ReactDOM.createRoot(document.getElementById('root')).render(<Demo />);
</script>
</body>
</html>
