<!-- @startingPoint section="Écrans" subtitle="Console interne : dashboard direction + admin matrices" viewport="1320x900" -->
<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>NeoTravel — Console direction</title>
<link rel="icon" href="../../assets/neotravel-mark.svg" />
<link rel="stylesheet" href="../../styles.css" />
<style>
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{background:var(--surface-page);font-family:var(--font-sans);color:var(--text-body);-webkit-font-smoothing:antialiased}
  .nt-ico svg{width:100%;height:100%;display:block}
  ::selection{background:var(--dawn-300);color:var(--petrol-950)}
  @media(max-width:1080px){.nt-kpis{grid-template-columns:1fr 1fr !important}.nt-mat-grid,.nt-proof-grid{grid-template-columns:1fr !important}}
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="https://unpkg.com/lucide@0.460.0/dist/umd/lucide.min.js"></script>
<script src="../../_ds_bundle.js"></script>
<script>
  if (window.NeoTravelDesignSystem_389d31) Object.assign(window, window.NeoTravelDesignSystem_389d31);
</script>

<script type="text/babel" src="../_shared/Icon.jsx"></script>
<script type="text/babel" src="./ConsoleShell.jsx"></script>
<script type="text/babel" src="./DashboardViews.jsx"></script>
<script type="text/babel" src="./MatricesView.jsx"></script>
<script type="text/babel">
  const { useState, useEffect } = React;
  function App() {
    const [view, setView] = useState('pilotage');
    useEffect(() => { lucide.createIcons({ nameAttr: 'data-lucide', attrs: { 'stroke-width': 1.75 } }); }, [view]);
    const Views = { pilotage: Pilotage, pipeline: Pipeline, relances: Relances, matrices: Matrices };
    const Current = Views[view] || Pilotage;
    return (
      <ConsoleShell view={view} setView={setView}>
        <Current />
      </ConsoleShell>
    );
  }
  ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
