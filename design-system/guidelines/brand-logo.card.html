<!DOCTYPE html>
<html lang="fr"><head><meta charset="utf-8" /><link rel="stylesheet" href="../styles.css" />
<style>html,body{margin:0}body{font-family:var(--font-sans);padding:0;display:grid;grid-template-columns:1fr 1fr}
.cell{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;padding:28px}
.cap{font:11px/1 var(--font-mono);color:var(--text-subtle)}</style></head>
<body>
<div class="cell" style="background:var(--surface-page)">
  <img src="../assets/neotravel-logo.svg" alt="NeoTravel" style="height:40px" />
  <div style="display:flex;gap:16px;align-items:center"><img src="../assets/neotravel-mark.svg" style="height:36px" /><span class="cap">marque seule</span></div>
  <span class="cap" style="color:var(--text-subtle)">sur fond clair</span>
</div>
<div class="cell" style="background:var(--gradient-dusk)">
  <img src="../assets/neotravel-logo-light.svg" alt="NeoTravel" style="height:40px" />
  <span class="cap" style="color:var(--horizon-300)">sur fond petrol</span>
</div>
</body></html>
