<!-- @dsCard group="Couleurs" viewport="700x180" name="Aube — accent" subtitle="La lueur chaude du soleil sur la route — l'appel à l'action" -->
<!DOCTYPE html>
<html lang="fr"><head><meta charset="utf-8" /><link rel="stylesheet" href="../styles.css" />
<style>
  html,body{margin:0}body{background:var(--surface-page);font-family:var(--font-sans);padding:20px}
  .row{display:flex;border-radius:var(--radius-md);overflow:hidden;box-shadow:var(--shadow-sm)}
  .sw{flex:1;height:96px;display:flex;flex-direction:column;justify-content:flex-end;padding:10px}
  .sw small{font-size:10.5px;opacity:.8;font-family:var(--font-mono)}
  .sw b{font-size:12px;font-weight:600}
</style></head>
<body>
<div class="row">
  <div class="sw" style="background:var(--dawn-700);color:#fff"><b>700</b><small style="color:rgba(255,255,255,.85)">#CC7A45</small></div>
  <div class="sw" style="background:var(--dawn-600);color:#fff"><b>600</b><small style="color:rgba(255,255,255,.85)">#E08A52</small></div>
  <div class="sw" style="background:var(--dawn-500);color:var(--text-on-accent)"><b>500 · accent</b><small>#F0A062</small></div>
  <div class="sw" style="background:var(--dawn-400);color:var(--text-on-accent)"><b>400</b><small>#F6B884</small></div>
  <div class="sw" style="background:var(--dawn-300);color:var(--text-on-accent)"><b>300</b><small>#FAD0AC</small></div>
  <div class="sw" style="background:var(--dawn-200);color:var(--text-on-accent)"><b>200</b><small>#FCE3CD</small></div>
  <div class="sw" style="background:var(--dawn-100);color:var(--text-on-accent)"><b>100</b><small>#FDF1E6</small></div>
</div>
</body></html>
