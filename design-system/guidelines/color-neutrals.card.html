<!-- @dsCard group="Couleurs" viewport="700x210" name="Petrol & neutres chauds" subtitle="L'encre profonde et la lumière du matin sur le marbre" -->
<!DOCTYPE html>
<html lang="fr"><head><meta charset="utf-8" /><link rel="stylesheet" href="../styles.css" />
<style>
  html,body{margin:0}body{background:var(--surface-page);font-family:var(--font-sans);padding:20px}
  .grp{margin-bottom:14px}
  .lbl{font:600 11px/1 var(--font-sans);text-transform:uppercase;letter-spacing:.12em;color:var(--text-subtle);margin:0 0 8px}
  .row{display:flex;border-radius:var(--radius-sm);overflow:hidden;box-shadow:var(--shadow-xs)}
  .sw{flex:1;height:60px;display:flex;flex-direction:column;justify-content:flex-end;padding:8px}
  .sw small{font-size:10px;opacity:.85;font-family:var(--font-mono)}
  .sw b{font-size:11px;font-weight:600}
</style></head>
<body>
<div class="grp">
  <p class="lbl">Petrol — encre & surfaces profondes</p>
  <div class="row">
    <div class="sw" style="background:var(--petrol-950);color:#fff"><b>950</b><small style="color:rgba(255,255,255,.8)">#0A2029</small></div>
    <div class="sw" style="background:var(--petrol-900);color:#fff"><b>900 · texte</b><small style="color:rgba(255,255,255,.8)">#0E2A38</small></div>
    <div class="sw" style="background:var(--petrol-800);color:#fff"><b>800</b><small style="color:rgba(255,255,255,.8)">#143845</small></div>
    <div class="sw" style="background:var(--petrol-700);color:#fff"><b>700</b><small style="color:rgba(255,255,255,.8)">#1C4A5A</small></div>
  </div>
</div>
<div class="grp" style="margin-bottom:0">
  <p class="lbl">Sable & pierre — neutres chauds</p>
  <div class="row">
    <div class="sw" style="background:var(--sand-50);color:var(--text-body);border:1px solid var(--border-soft)"><b>sand-50 · page</b><small>#FBF7F2</small></div>
    <div class="sw" style="background:var(--sand-100);color:var(--text-body)"><b>sand-100</b><small>#F5EFE6</small></div>
    <div class="sw" style="background:var(--stone-300);color:var(--petrol-900)"><b>stone-300</b><small>#CFC6B9</small></div>
    <div class="sw" style="background:var(--stone-500);color:#fff"><b>stone-500</b><small style="color:rgba(255,255,255,.8)">#7B7264</small></div>
    <div class="sw" style="background:var(--stone-600);color:#fff"><b>stone-600</b><small style="color:rgba(255,255,255,.8)">#564E43</small></div>
  </div>
</div>
</body></html>
