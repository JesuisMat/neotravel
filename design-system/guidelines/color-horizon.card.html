<!-- @dsCard group="Couleurs" viewport="700x180" name="Horizon — primaire" subtitle="Le bleu serein du ciel au lever — couleur de marque & signalétique" -->
<!DOCTYPE html>
<html lang="fr"><head><meta charset="utf-8" /><link rel="stylesheet" href="../styles.css" />
<style>
  html,body{margin:0}body{background:var(--surface-page);font-family:var(--font-sans);padding:20px}
  .row{display:flex;gap:0;border-radius:var(--radius-md);overflow:hidden;box-shadow:var(--shadow-sm)}
  .sw{flex:1;height:96px;display:flex;flex-direction:column;justify-content:flex-end;padding:10px;color:#fff}
  .sw small{font-size:10.5px;opacity:.85;font-family:var(--font-mono)}
  .sw b{font-size:12px;font-weight:600}
  .dark small{color:rgba(255,255,255,.85)}
</style></head>
<body>
<div class="row">
  <div class="sw" style="background:var(--horizon-700)"><b>700</b><small>#245A6F</small></div>
  <div class="sw" style="background:var(--horizon-600)"><b>600 · brand</b><small>#2C6378</small></div>
  <div class="sw" style="background:var(--horizon-500)"><b>500</b><small>#3A7B92</small></div>
  <div class="sw" style="background:var(--horizon-400)"><b>400</b><small>#5E9BB0</small></div>
  <div class="sw" style="background:var(--horizon-300);color:var(--petrol-900)"><b>300</b><small style="color:var(--petrol-800)">#93BECD</small></div>
  <div class="sw" style="background:var(--horizon-200);color:var(--petrol-900)"><b>200</b><small style="color:var(--petrol-800)">#C3DBE3</small></div>
  <div class="sw" style="background:var(--horizon-100);color:var(--petrol-900)"><b>100</b><small style="color:var(--petrol-800)">#E2EEF2</small></div>
</div>
</body></html>
