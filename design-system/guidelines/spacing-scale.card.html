<!DOCTYPE html>
<html lang="fr"><head><meta charset="utf-8" /><link rel="stylesheet" href="../styles.css" />
<style>html,body{margin:0}body{background:var(--surface-page);font-family:var(--font-sans);padding:24px}
.row{display:flex;align-items:flex-end;gap:14px}
.unit{display:flex;flex-direction:column;align-items:center;gap:7px}
.bar{background:var(--gradient-sunrise);border-radius:var(--radius-xs)}
.t{font:600 11px/1 var(--font-mono);color:var(--text-muted)}
.p{font:10px/1 var(--font-sans);color:var(--text-subtle)}</style></head>
<body>
<div class="row">
  <div class="unit"><div class="bar" style="width:4px;height:4px"></div><span class="t">1</span><span class="p">4</span></div>
  <div class="unit"><div class="bar" style="width:8px;height:8px"></div><span class="t">2</span><span class="p">8</span></div>
  <div class="unit"><div class="bar" style="width:12px;height:12px"></div><span class="t">3</span><span class="p">12</span></div>
  <div class="unit"><div class="bar" style="width:16px;height:16px"></div><span class="t">4</span><span class="p">16</span></div>
  <div class="unit"><div class="bar" style="width:24px;height:24px"></div><span class="t">6</span><span class="p">24</span></div>
  <div class="unit"><div class="bar" style="width:32px;height:32px"></div><span class="t">8</span><span class="p">32</span></div>
  <div class="unit"><div class="bar" style="width:48px;height:48px"></div><span class="t">12</span><span class="p">48</span></div>
  <div class="unit"><div class="bar" style="width:64px;height:64px"></div><span class="t">16</span><span class="p">64</span></div>
  <div class="unit"><div class="bar" style="width:96px;height:96px"></div><span class="t">24</span><span class="p">96</span></div>
</div>
</body></html>
