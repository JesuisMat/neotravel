<!DOCTYPE html>
<html lang="fr"><head><meta charset="utf-8" /><link rel="stylesheet" href="../styles.css" />
<style>html,body{margin:0}body{background:var(--surface-page);font-family:var(--font-sans);padding:18px;display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
.g{height:150px;border-radius:var(--radius-lg);box-shadow:var(--shadow-md);display:flex;flex-direction:column;justify-content:flex-end;padding:14px;position:relative;overflow:hidden}
.g b{font:600 13px/1 var(--font-sans)}
.g small{font:11px/1.3 var(--font-sans);opacity:.9;margin-top:4px;display:block}</style></head>
<body>
<div class="g" style="background:var(--gradient-dawn)"><b style="color:var(--petrol-900)">Aube</b><small style="color:var(--petrol-800)">ciel serein → bande chaude → lueur au sol</small></div>
<div class="g" style="background:var(--gradient-sunrise)"><b style="color:var(--petrol-900)">Lever de soleil</b><small style="color:var(--petrol-800)">radial chaud · halos &amp; CTA</small></div>
<div class="g" style="background:var(--gradient-dusk)"><b style="color:#fff">Crépuscule</b><small style="color:var(--horizon-300)">hall premium · fonds sombres</small></div>
</body></html>
