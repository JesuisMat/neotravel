<!-- @dsCard group="Espacement" viewport="700x170" name="Rayons & ombres" subtitle="Coins généreux et doux ; ombres diffuses teintées petrol" -->
<!DOCTYPE html>
<html lang="fr"><head><meta charset="utf-8" /><link rel="stylesheet" href="../styles.css" />
<style>html,body{margin:0}body{background:var(--surface-page);font-family:var(--font-sans);padding:24px;display:flex;gap:28px;flex-wrap:wrap;align-items:center}
.box{width:78px;height:60px;background:var(--surface-card);border:1px solid var(--border-soft);display:flex;align-items:flex-end;justify-content:center;padding-bottom:7px}
.t{font:600 10.5px/1 var(--font-mono);color:var(--text-muted)}
.grp{display:flex;gap:16px;align-items:center}
.lbl{font:600 11px/1 var(--font-sans);text-transform:uppercase;letter-spacing:.1em;color:var(--text-subtle);writing-mode:vertical-rl;transform:rotate(180deg)}</style></head>
<body>
<div class="grp">
  <div class="box" style="border-radius:var(--radius-sm)"><span class="t">sm 9</span></div>
  <div class="box" style="border-radius:var(--radius-md)"><span class="t">md 14</span></div>
  <div class="box" style="border-radius:var(--radius-lg)"><span class="t">lg 20</span></div>
  <div class="box" style="border-radius:var(--radius-xl)"><span class="t">xl 28</span></div>
  <div class="box" style="border-radius:var(--radius-pill);width:96px"><span class="t">pill</span></div>
</div>
<div style="width:1px;height:64px;background:var(--border-medium)"></div>
<div class="grp">
  <div class="box" style="border-radius:var(--radius-md);border:none;box-shadow:var(--shadow-sm)"><span class="t">sm</span></div>
  <div class="box" style="border-radius:var(--radius-md);border:none;box-shadow:var(--shadow-md)"><span class="t">md</span></div>
  <div class="box" style="border-radius:var(--radius-md);border:none;box-shadow:var(--shadow-lg)"><span class="t">lg</span></div>
  <div class="box" style="border-radius:var(--radius-md);border:none;box-shadow:var(--shadow-glow)"><span class="t">glow</span></div>
</div>
</body></html>
